name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: this workflow only reads the repo (the generated-API drift
# check inspects `git status`; nothing here writes back). Override per-step if a
# future job needs more.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid PR pushes) — but never cancel
# a run on main, so every main commit is fully verified and populates the cache.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    name: check (generate · biome · typecheck · test · expo · build · web-e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Actions track their latest major tag (auto-receive patches/minors); Dependabot
      # opens PRs for new majors (.github/dependabot.yml).
      - uses: actions/checkout@v7

      # pnpm version is read from the root package.json `packageManager` field.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      # Node version is read from the root package.json `engines.node` field.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm

      # Persist Turborepo's content-addressed cache across runs so unchanged
      # workspaces skip build/typecheck. Each run writes a fresh sha-keyed entry
      # and restores the most recent prior one via the restore-keys prefix.
      - name: Cache Turborepo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      # Next.js manages .next/cache itself (it's excluded from Turbo outputs),
      # so cache it separately to speed up the apps/web build.
      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/**/*.[jt]s', 'apps/web/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Verify the generated API client is committed in-sync with openapi.json:
      # regenerate, then fail if anything changed (no drift between spec and code).
      - name: Verify generated API client is up to date
        run: |
          pnpm generate
          if [ -n "$(git status --porcelain packages/api-client/src/generated)" ]; then
            echo "::error::api-client/src/generated is out of date. Run 'pnpm generate' and commit the result."
            git --no-pager diff --stat packages/api-client/src/generated
            exit 1
          fi

      # Workspace dependency hygiene: single version of each dependency across all
      # packages, no unused/mismatched deps, catalog discipline intact. The cosmetic
      # `unordered-dependencies` rule is disabled (it conflicts with the house ordering
      # that keeps @biomejs/biome after the @types/* block).
      - name: Dependency hygiene (sherif)
        run: pnpm lint:deps

      # biome ci runs format + lint + assist (organize-imports) checks in one no-write
      # pass, scoped by biome.json (vendored/generated and build output excluded there).
      # --error-on-warnings makes warnings (unused vars, Tailwind class order, …) fail the
      # build, on top of errors like the web-ui/native-ui import boundary. Unlike a separate
      # `biome format` + `biome lint`, this also enforces import organization (an assist
      # action that neither format nor lint checks on its own).
      - name: Biome (format · lint · assist, zero warnings)
        run: pnpm biome:ci

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # The native app emits no artifact from `turbo build` (Expo builds via prebuild/EAS),
      # so it's otherwise only typechecked. expo-doctor runs Expo's full project audit —
      # SDK-vs-dependency version alignment, app.json schema, Metro config, duplicate
      # native modules — catching native breaks that typecheck can't see.
      - name: Expo Doctor (native)
        working-directory: apps/native
        run: npx --yes expo-doctor

      - name: Build
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Web E2E (Playwright)
        run: pnpm --filter web test:e2e

      # On runs where Turbo replays the web build from its cache, `next build`
      # never executes and writes nothing to .next/cache, so the post-job save
      # would warn "path does not exist". Ensure the dir exists to silence that
      # benign warning; it stays populated on Turbo-miss runs that rebuild web.
      - name: Ensure Next.js cache dir exists
        run: mkdir -p apps/web/.next/cache
