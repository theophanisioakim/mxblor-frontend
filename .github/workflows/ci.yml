name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid PR pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check (generate · biome · typecheck · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from the root package.json `packageManager` field.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # Node version is read from the root package.json `engines.node` field.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      # Persist Turborepo's content-addressed cache across runs so unchanged
      # workspaces skip build/typecheck. Each run writes a fresh sha-keyed entry
      # and restores the most recent prior one via the restore-keys prefix.
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      # Next.js manages .next/cache itself (it's excluded from Turbo outputs),
      # so cache it separately to speed up the apps/web build.
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/**/*.[jt]s', 'apps/web/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Verify the generated API client is committed in-sync with openapi.json:
      # regenerate, then fail if anything changed (no drift between spec and code).
      - name: Verify generated API client is up to date
        run: |
          pnpm generate
          if [ -n "$(git status --porcelain packages/api-client/src/generated)" ]; then
            echo "::error::api-client/src/generated is out of date. Run 'pnpm generate' and commit the result."
            git --no-pager diff --stat packages/api-client/src/generated
            exit 1
          fi

      # biome ci runs format + lint + assist (organize-imports) checks in one no-write
      # pass, scoped by biome.json (vendored/generated and build output excluded there).
      # --error-on-warnings makes warnings (unused vars, Tailwind class order, …) fail the
      # build, on top of errors like the web-ui/native-ui import boundary. Unlike a separate
      # `biome format` + `biome lint`, this also enforces import organization (an assist
      # action that neither format nor lint checks on its own).
      - name: Biome (format · lint · assist, zero warnings)
        run: pnpm biome:ci

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
