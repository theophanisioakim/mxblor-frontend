packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  esbuild: true
  msw: true
  sharp: true
  unrs-resolver: true

# Use a flat (npm-style) node_modules instead of pnpm's nested `.pnpm/<pkg>@<ver>_<hash>/`
# layout. Required for the React Native New Architecture build on Windows: the deep
# `.pnpm` paths push native C++ object files (react-native-worklets/reanimated) past
# the Windows / CMAKE_OBJECT_PATH_MAX path-length limit. Hoisting also makes NativeWind's
# `react-native-css-interop/jsx-runtime` resolvable from every package's source.
nodeLinker: hoisted

# Force a single React Native version across the whole workspace. react-native-mmkv
# (and other libs) declare `react-native: *`, which pnpm would otherwise resolve to
# the latest (0.85.x) as a second, nested copy — breaking the New-Arch Gradle codegen
# (it parses the newer copy's core specs with the app's older @react-native/codegen).
overrides:
  react-native: "0.83.6"

