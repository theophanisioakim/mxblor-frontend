# NativeWind v4 requires Tailwind v3, which conflicts with the web's Tailwind v4
# in the default catalog. Native packages reference this via `catalog:tailwind3`.
catalogs:
  tailwind3:
    'tailwindcss': "^3.4.17"

minimumReleaseAgeExclude:
  - nativewind@4.2.5
  - react-native-css-interop@0.2.5
